<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="todo">
        <div class="todo__container">
            <div class="todo__toolbar">
                <form class="todo__form" id="todo-form" action="#" method="post">
                    <div class="todo__field">
                        <input type="text" class="todo__input" name="title" placeholder="Название" autocomplete="off">
                        <button type="submit" class="todo__submit" aria-label="Добавить задачу">+</button>
                    </div>
                </form>
                <select class="todo__filter" name="filter" aria-label="Показать задачи">
                    <option value="active">Активные</option>
                    <option value="completed">Завершенные</option>
                    <option value="deleted">Удаленные</option>
                </select>
            </div>
            <ul class="todo__tasks" role="list"></ul>
        </div>
    </main>
    <script type="module" src="js/index.js"></script>
</body>
</html>
